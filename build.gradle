plugins {
    id 'groovy'
}

repositories {
    mavenCentral()
}

dependencies {
    // Groovy 4 runtime (org.apache.groovy GA since 4.0)
    testImplementation 'org.apache.groovy:groovy-all:4.0.21'

    // Spock framework (compiled for Groovy 4)
    testImplementation 'org.spockframework:spock-core:2.3-groovy-4.0'

    // JUnit Platform Launcher (required for Spock 2 + Gradle)
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.10.1'
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

sourceSets {
    test {
        groovy {
            srcDirs = ['src/test/groovy']
        }
    }
}

test {
    useJUnitPlatform()
    testLogging {
        events 'passed', 'skipped', 'failed'
        showStandardStreams false
        exceptionFormat 'full'
    }
    // Make the app source file available to tests
    systemProperty 'app.source.path',
        file('HubitatBulkFileManager.groovy').absolutePath
}
